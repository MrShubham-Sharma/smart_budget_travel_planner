<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Confidential Vault | Smart Budget Travel Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0a0a;
            --surface: #1a1515;
            --primary: #f87171; /* Soft Red */
            --border: rgba(248, 113, 113, 0.2);
            --text: #f9fafb;
            --text-muted: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* ── Glassmorphism Panel ── */
        .vault-panel {
            width: 95%;
            max-width: 1000px;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 50px rgba(248, 113, 113, 0.1);
            backdrop-filter: blur(10px);
            margin: 2rem;
        }

        h1 { font-size: 2rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 12px; color: var(--primary); }
        p.subtitle { color: var(--text-muted); margin-bottom: 2rem; }

        /* ── Locked State ── */
        .locked-container {
            text-align: center;
            padding: 2rem 0;
        }
        .lock-icon { font-size: 4rem; margin-bottom: 1.5rem; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px #f87171); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(248,113,113,0.4)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px #f87171); }
        }

        .input-group { position: relative; max-width: 350px; margin: 0 auto; }
        input[type="password"] {
            width: 100%;
            background: #261e1e;
            border: 1px solid var(--border);
            padding: 12px 15px;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(248,113,113,0.2); }

        .btn {
            background: var(--primary);
            color: #000;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(248,113,113,0.3); }

        /* ── Data Table (Initially Hidden) ── */
        #data-container { display: none; }
        .table-wrapper { overflow-x: auto; margin-top: 1.5rem; max-height: 500px; overflow-y: auto;}
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { 
            color: var(--text-muted); 
            font-weight: 600; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            position: sticky; 
            top: 0; 
            background: var(--surface);
        }
        .secret-value {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(248, 113, 113, 0.1);
            color: #fca5a5;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .back-link { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .back-link:hover { color: var(--primary); }

        .loader {
            border: 3px solid rgba(248, 113, 113, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #unlock-message { margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="vault-panel">
        <div class="header-actions">
            <a href="/admin" class="back-link">← Return to Admin Panel</a>
            <div id="status-badge" style="font-size: 0.75rem; color:#f87171;">🔴 ENCRYPTED</div>
        </div>

        <h1>🔐 Confidential Credential Vault</h1>
        <p class="subtitle">Highly sensitive administrative resource. Access restricted.</p>

        <!-- Locked Screen -->
        <div id="locked-state" class="locked-container">
            <div class="lock-icon">🔒</div>
            <h3>Master Key Authorization Required</h3>
            <p style="color: var(--text-muted); margin: 0.5rem 0 1.5rem 0;">Enter the vault master key to decrypt user credentials.</p>
            
            <div class="input-group">
                <input type="password" id="masterKey" placeholder="••••••••••••" onkeypress="handleEnter(event)">
                <button class="btn" onclick="unlockVault()">Authenticate Access</button>
                <div class="loader" id="unlockLoader"></div>
                <div id="unlock-message"></div>
            </div>
        </div>

        <!-- Unlocked Screen -->
        <div id="data-container">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Email Address</th>
                            <th>Real / Plain-Text Password</th>
                            <th>Account Status</th>
                        </tr>
                    </thead>
                    <tbody id="vault-body">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function handleEnter(e) {
            if (e.key === 'Enter') unlockVault();
        }

        async function unlockVault() {
            const key = document.getElementById('masterKey').value;
            const messageEl = document.getElementById('unlock-message');
            const loader = document.getElementById('unlockLoader');

            if (!key) return;

            loader.style.display = 'block';
            messageEl.textContent = '';

            try {
                const response = await fetch('/api/unlock-vault', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ master_key: key })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Success! Switch UI
                    document.getElementById('locked-state').style.display = 'none';
                    document.getElementById('data-container').style.display = 'block';
                    document.getElementById('status-badge').textContent = '🟢 DECRYPTED';
                    document.getElementById('status-badge').style.color = '#10b981';
                    loadVaultData();
                } else {
                    messageEl.textContent = '❌ Access Denied: Invalid Master Key';
                    messageEl.style.color = '#ef4444';
                    loader.style.display = 'none';
                }
            } catch (err) {
                messageEl.textContent = '⚠️ Authorization Error. Try again.';
                loader.style.display = 'none';
            }
        }

        async function loadVaultData() {
            try {
                // We reuse admin-stats but it only shows plain passwords if session[vault_unlocked] is set
                const res = await fetch('/api/admin-stats');
                const data = await res.json();
                const tbody = document.getElementById('vault-body');
                tbody.innerHTML = '';

                data.all_users.forEach(u => {
                    // u = [id, name, email, password, is_admin, is_blocked, plain_password]
                    const tr = document.createElement('tr');
                    const plainPass = u[6] || '<span style="color:#6b7280;font-style:italic;">Hashed (Legacy)</span>';
                    const isBlocked = u[5];

                    tr.innerHTML = `
                        <td><span style="font-weight:700;color:var(--primary);">#${u[0]}</span></td>
                        <td>${u[2]}</td>
                        <td><span class="secret-value">${plainPass}</span></td>
                        <td>
                            <span style="font-size:0.75rem;padding:2px 8px;border-radius:4px;background:${isBlocked ? 'rgba(239,68,68,0.1);color:#ef4444;' : 'rgba(16,185,129,0.1);color:#10b981;'}">
                                ${isBlocked ? 'BLOCKED' : 'ACTIVE'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error('Vault Load Error', e);
            }
        }
    </script>
</body>
</html>
