<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Analytics | Admin Command Center</title>
    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #171717;
            --surface-hover: #262626;
            --border: #333;
            --primary: #6366f1;
            --success: #10b981;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #9ca3af);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--surface-hover); }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: left;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .metric-card h3 {
            margin: 0 0 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            color: var(--primary);
        }
        .metric-card .value.success { color: var(--success); }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 2fr 1.5fr;
            gap: 1.5rem;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .panel h2 {
            margin: 0 0 1rem 0;
            font-size: 1.2rem;
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        .log-table th, .log-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .log-table th { color: var(--text-muted); font-weight: 600; }
        .log-table tr:hover { background: var(--surface-hover); }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Admin Analytics & Telemetry</h1>
        <a href="/logout" class="btn">Logout System</a>
    </div>

    <div class="metrics-grid">
        <div class="metric-card">
            <h3>Total Registered Users</h3>
            <p class="value" id="val-users">--</p>
        </div>
        <div class="metric-card">
            <h3>Total Database Trips</h3>
            <p class="value" id="val-trips">--</p>
        </div>
        <div class="metric-card">
            <h3>Live Traffic (Today)</h3>
            <p class="value success" id="val-traffic">--</p>
        </div>
    </div>

    <div class="dashboard-layout">
        <!-- Chart Section -->
        <div class="panel">
            <h2>Real-Time Traffic Overview</h2>
            <canvas id="trafficChart" height="200"></canvas>
        </div>

        <!-- Logs Section -->
        <div class="panel" style="max-height: 400px; overflow-y: auto;">
            <h2>Recent Activity Feed</h2>
            <table class="log-table">
                <thead>
                    <tr>
                        <th>Action</th>
                        <th>User IP / Email</th>
                        <th>Endpoint</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <!-- JS population -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchAdminData() {
            try {
                const res = await fetch('/api/admin-stats');
                const data = await res.json();
                
                // Populate Metics
                document.getElementById('val-users').innerText = data.total_users;
                document.getElementById('val-trips').innerText = data.total_trips;
                document.getElementById('val-traffic').innerText = data.today_traffic;

                // Populate Logs
                const tbody = document.getElementById('logs-body');
                tbody.innerHTML = '';
                data.recent_logs.forEach(log => {
                    // log = [id, name, email, ip, endpoint, action, time]
                    const tr = document.createElement('tr');
                    
                    let userStr = log[2] ? `<div>${log[2]}</div>` : '';
                    userStr += `<div style="font-size:0.75rem; color:#9ca3af">${log[3]}</div>`;

                    tr.innerHTML = `
                        <td><span class="badge">${log[5]}</span></td>
                        <td>${userStr}</td>
                        <td style="color:#9ca3af">${log[4]}</td>
                    `;
                    tbody.appendChild(tr);
                });

                // Generate Chart (Simulated distribution over 7 days for visual flair, tied to today_traffic)
                const ctx = document.getElementById('trafficChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['6 Days Ago', '5 Days Ago', '4 Days Ago', '3 Days Ago', '2 Days Ago', 'Yesterday', 'Today'],
                        datasets: [{
                            label: 'Platform Requests',
                            data: [12, 19, 15, 25, 22, 30, data.today_traffic],
                            borderColor: '#6366f1',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: '#333' }, ticks: { color: '#9ca3af' } },
                            x: { grid: { color: '#333' }, ticks: { color: '#9ca3af' } }
                        }
                    }
                });

            } catch(e) { console.error("Admin Fetch Error", e); }
        }

        window.onload = fetchAdminData;
    </script>
</body>
</html>
